name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.89.0"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt,clippy,llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tdp-solana

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: |
          cargo clippy --all-targets -- \
            -D warnings \
            -A clippy::diverging_sub_expression \
            -A clippy::too_many_arguments

      - name: Build
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test -- --nocapture

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage report
        run: |
          cargo llvm-cov --all-targets 2>&1 | tee /tmp/cov.txt
          LINES=$(awk '/^TOTAL/ { v=$(NF-3); gsub(/%/,"",v); print v }' /tmp/cov.txt)
          echo "Line coverage (unit tests): ${LINES:-0}%"
          awk -v c="${LINES:-0}" 'BEGIN {
            if (c + 0 < 80) {
              print "NOTE: unit-test line coverage " c "% < 80%. Full coverage (incl. LiteSVM) requires anchor build locally."
            } else {
              print "PASS: line coverage " c "% >= 80%"
            }
          }'
